networks:
  c1-network:
    name: c1-network
    driver: bridge

services:
  ########## nginx ##########
  nginx:
    image: nginx:1.24.0
    container_name: nginx
    networks:
      - c1-network
    ports:
      - "8090:8090"
    volumes:
      - /opt/app/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/app/frontend/c1-client:/opt/app/c1-client
      - /opt/app/frontend/bi-client:/opt/app/bi-client
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 添加 extra_hosts 配置
    extra_hosts:
      - "myhost:host-gateway"  # Linux 系统访问宿主机
