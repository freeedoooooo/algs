site_name: 我的算法笔记
site_description: 基于 my-notes 整理的个人算法学习站点
site_url: ""
repo_url: ""
docs_dir: ../.site-docs
site_dir: ../site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 首页: index.md
  - 基础巩固:
      - 开始阅读: sections/foundation-basics.md
      - 总览: my-notes/01-基础巩固/README.md
  - 基础提升:
      - 开始阅读: sections/foundation-advanced.md
      - 总览: my-notes/02-基础提升/README.md
  - 中级提升:
      - 开始阅读: sections/intermediate.md
      - 总览: my-notes/03-中级提升/README.md
  - 大厂真题:
      - 开始阅读: sections/big-tech.md
      - 总览: my-notes/09-大厂真题/README.md
  - 笔记总览: my-notes/README.md
