services:
  open-webui:
    # open-webui=v0.6.34
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://10.0.5.174:11434
      - ENABLE_RAG=False
      - DISABLE_AUTH=true  # 禁用所有认证，直接访问
    volumes:
      - open-webui-data:/opt/open-webui/data
    restart: unless-stopped

volumes:
  open-webui-data:
