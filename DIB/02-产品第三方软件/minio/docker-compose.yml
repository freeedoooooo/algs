networks:
  c1-network:
    name: c1-network
    driver: bridge

services:
  ########## minio ##########
  minio:
    image: minio/minio:RELEASE.2021-12-09T06-19-41Z
    container_name: minio
    networks:
      - c1-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dib}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dib@12345}
      MINIO_SERVER_URL: http://10.0.5.142:9000
    volumes:
      - /opt/minio/data:/opt/minio/data
      - /opt/minio/config:/root/.minio
    command: server --console-address :9001 /opt/minio/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s