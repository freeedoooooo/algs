networks:
  c1-network:
    name: c1-network
    driver: bridge

services:
  ########## redis ##########
  redis:
    image: redis:7.0
    container_name: redis
    networks:
      - c1-network
    ports:
      - "6379:6379"
    volumes:
      - /opt/redis/data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-dib@12345}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s