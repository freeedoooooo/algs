networks:
  c1-network:
    name: c1-network
    driver: bridge

services:
  ########## 以下为 platform 各微服务 ##########
  platform-auth-server:
    image: 10.0.6.183:8088/c1/platform-auth-server:${C1_VERSION:-latest}
    pull_policy: always
    container_name: platform-auth-server
    networks:
      - c1-network
    ports:
      - "9090:9090"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/platform-auth-server/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5

  platform-gateway:
    image: 10.0.6.183:8088/c1/platform-gateway:${C1_VERSION:-latest}
    pull_policy: always
    container_name: platform-gateway
    networks:
      - c1-network
    ports:
      - "20000:20000"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/platform-gateway/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5

  platform-auth-resource:
    image: 10.0.6.183:8088/c1/platform-auth-resource:${C1_VERSION:-latest}
    pull_policy: always
    container_name: platform-auth-resource
    networks:
      - c1-network
    ports:
      - "20001:20001"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/platform-auth-resource/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:20001/api/auth/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  platform-mdm:
    image: 10.0.6.183:8088/c1/platform-mdm:${C1_VERSION:-latest}
    pull_policy: always
    container_name: platform-mdm
    networks:
      - c1-network
    ports:
      - "20002:20002"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/platform-mdm/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:20002/api/mdm/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  ########## 以下为 c1 各业务微服务 ##########
  c1-extract:
    image: 10.0.6.183:8088/c1/c1-extract:${C1_VERSION:-latest}
    pull_policy: always
    container_name: c1-extract
    networks:
      - c1-network
    ports:
      - "30001:30001"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
      - OCR_SERVER=${C1_EXTRACT_OCR_SERVER:-http://192.168.10.91:8089/}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/c1-extract/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:30001/api/extract/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  c1-report:
    image: 10.0.6.183:8088/c1/c1-report:${C1_VERSION:-latest}
    pull_policy: always
    container_name: c1-report
    networks:
      - c1-network
    ports:
      - "30002:30002"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/c1-report/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:30002/api/report/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  c1-data:
    image: 10.0.6.183:8088/c1/c1-data:${C1_VERSION:-latest}
    pull_policy: always
    container_name: c1-data
    networks:
      - c1-network
    ports:
      - "30003:30003"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/c1-data/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:30003/api/data/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  c1-rule:
    image: 10.0.6.183:8088/c1/c1-rule:${C1_VERSION:-latest}
    pull_policy: always
    container_name: c1-rule
    networks:
      - c1-network
    ports:
      - "30004:30004"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/c1-rule/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:30004/api/rule/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  c1-dg:
    image: 10.0.6.183:8088/c1/c1-dg:${C1_VERSION:-latest}
    pull_policy: always
    container_name: c1-dg
    networks:
      - c1-network
    ports:
      - "30005:30005"
    environment:
      - C1_ENV=${C1_ENV:?缺少 C1_ENV 环境变量}
    env_file:
      - .env
    volumes:
      - /opt/app/backend/c1-dg/logs:/opt/app/logs
      - /usr/share/fonts:/usr/share/fonts
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:30005/api/dg/actuator/health || exit 1" ]
      interval: 10s
      timeout: 5s
