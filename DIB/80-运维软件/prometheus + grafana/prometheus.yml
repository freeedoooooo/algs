global:
  scrape_interval: 15s

scrape_configs:
  # 监控 Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # 监控 auth-server 微服务
  - job_name: 'data-cloud-auth-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ '10.0.5.142:9090' ]
      - targets: [ '10.0.5.70:9090' ]
      - targets: [ '10.0.5.101:9090' ]
      - targets: [ '10.0.5.239:9090' ]

  # 监控 eureka 微服务
  - job_name: 'data-cloud-eureka'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ '10.0.5.142:10000' ]
      - targets: [ '10.0.5.70:10000' ]
      - targets: [ '10.0.5.101:10000' ]
      - targets: [ '10.0.5.239:10000' ]

  # 监控 gateway 微服务
