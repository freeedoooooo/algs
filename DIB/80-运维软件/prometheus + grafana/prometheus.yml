      - targets: ['10.0.5.239:30002']

  # 监控 data 微服务
  - job_name: 'ms-data'
    metrics_path: '/api/data/actuator/prometheus'
    static_configs:
      - targets: [ '10.0.5.142:30003' ]
      - targets: [ '10.0.5.70:30003' ]
